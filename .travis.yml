language: python
python:
  - "3.12"
  - "nightly"
matrix:
  allow_failures:
    - python: "nightly"
dist: noble
sudo: true
install:
  - "pip install flake8 pycodestyle"
  - "pip install -r requirements.txt"
script:
  - "pycodestyle xjs"
  - "flake8 xjs"
  - python3 xjs examples/example.json > /dev/null
  - python3 xjs --offline examples/example.json > /dev/null
  - python3 xjs --offline examples/example.yaml > /dev/null
  - python3 xjs --offline examples/example2.yaml > /dev/null
  - python3 xjs --offline examples/example.json examples/example2.json > /dev/null
  - python3 xjs --offline --application glance examples/example.json > /dev/null
  - python3 xjs --offline --application rabbitmq-server examples/example.json > /dev/null
  - python3 xjs --offline --model k8s examples/example2.json > /dev/null
  - python3 xjs --offline --controller controller examples/example.json examples/example2.json > /dev/null
  - python3 xjs --offline --unit k8s/0 examples/example2.json > /dev/null
  - python3 xjs --offline --subordinate keystone-mysql-router/0 examples/example.json > /dev/null
